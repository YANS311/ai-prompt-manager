<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑 Prompt - AI Prompt Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .main-container {
            padding: 30px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="text-center text-white mb-4">
            <h1><i class="bi bi-pencil-square"></i> 编辑 Prompt</h1>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="bi bi-pencil"></i> 修改内容
            </div>
            <div class="card-body">
                <form th:action="@{/update/{id}(id=${prompt.id})}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">标题 *</label>
                            <input type="text" class="form-control" name="title"
                                   th:value="${prompt.title}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">分类</label>
                            <input type="text" class="form-control" name="category"
                                   th:value="${prompt.category}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">内容</label>
                        <textarea class="form-control" name="content" rows="10"
                                  th:text="${prompt.content}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> 保存修改
                    </button>
                    <a th:href="@{/manager}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> 取消
                    </a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
