<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Manager - 交互式管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .main-container {
            padding: 30px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            font-weight: 600;
        }
        .prompt-item {
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        .prompt-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .badge-category {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
        }
        .btn-danger {
            border-radius: 20px;
        }
        .timestamp {
            font-size: 0.85em;
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .search-box {
            border-radius: 25px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
        }
        .search-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <!-- Header -->
        <div class="text-center text-white mb-4">
            <h1 class="display-4 mb-2"><i class="bi bi-robot"></i> AI Prompt Manager</h1>
            <p class="lead">智能提示词与代码片段管理系统</p>
        </div>

        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-number" th:text="${prompts.size()}">0</div>
                    <div class="text-muted">总提示词数</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-number" th:text="${categories.size()}">0</div>
                    <div class="text-muted">分类数量</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-number">
                        <i class="bi bi-check-circle-fill text-success"></i>
                    </div>
                    <div class="text-muted">系统运行中</div>
                </div>
            </div>
        </div>

        <!-- Add New Prompt Form -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> 添加新的 Prompt
            </div>
            <div class="card-body">
                <form th:action="@{/add}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">标题 *</label>
                            <input type="text" class="form-control" name="title" required
                                   placeholder="例如：Spring Boot 微服务配置">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">分类</label>
                            <input type="text" class="form-control" name="category"
                                   list="categoryList" placeholder="例如：Java, Spring, AI">
                            <datalist id="categoryList">
                                <option th:each="cat : ${categories}" th:value="${cat}"></option>
                            </datalist>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">内容</label>
                        <textarea class="form-control" name="content" rows="5"
                                  placeholder="输入你的提示词或代码片段..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> 保存
                    </button>
                </form>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <form th:action="@{/}" method="get" class="d-flex">
                            <input type="text" class="form-control search-box me-2" name="keyword"
                                   th:value="${keyword}" placeholder="搜索标题...">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-search"></i> 搜索
                            </button>
                        </form>
                    </div>
                    <div class="col-md-4">
                        <form th:action="@{/}" method="get">
                            <select class="form-select search-box" name="category" onchange="this.form.submit()">
                                <option value="">全部分类</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat}"
                                        th:text="${cat}"
                                        th:selected="${cat == selectedCategory}"></option>
                            </select>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Prompts List -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <i class="bi bi-list-ul"></i> Prompt 列表
                    <span class="badge bg-light text-dark ms-2" th:text="${prompts.size()} + ' 条记录'">0 条记录</span>
                    <span th:if="${totalElements != null}" class="badge bg-info ms-2">
                        总计: <span th:text="${totalElements}">0</span> 条
                    </span>
                </div>
                <div th:if="${totalPages != null and totalPages > 1}">
                    <span class="text-white">页码: <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span></span>
                </div>
            </div>
            <div class="card-body">
                <div th:if="${prompts.isEmpty()}" class="empty-state">
                    <i class="bi bi-inbox" style="font-size: 4em;"></i>
                    <h4 class="mt-3">暂无数据</h4>
                    <p>快来添加你的第一个 Prompt 吧！</p>
                </div>

                <div th:each="prompt : ${prompts}" class="prompt-item card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <h5 class="card-title mb-2">
                                    <i class="bi bi-file-text text-primary"></i>
                                    <span th:text="${prompt.title}">标题</span>
                                </h5>
                                <span th:if="${prompt.category}"
                                      class="badge-category mb-2"
                                      th:text="${prompt.category}">分类</span>
                                <p class="card-text mt-2"
                                   th:text="${#strings.length(prompt.content) > 200 ? #strings.substring(prompt.content, 0, 200) + '...' : prompt.content}">
                                    内容预览
                                </p>
                                <div class="timestamp">
                                    <i class="bi bi-clock"></i>
                                    创建于: <span th:text="${#temporals.format(prompt.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    <span th:if="${prompt.updatedAt != null}">
                                        | 更新于: <span th:text="${#temporals.format(prompt.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    </span>
                                </div>
                            </div>
                            <div class="ms-3">
                                <a th:href="@{/edit/{id}(id=${prompt.id})}"
                                   class="btn btn-sm btn-outline-primary me-2">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/delete/{id}(id=${prompt.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除这个 Prompt 吗？')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${totalPages != null and totalPages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <!-- 首页 -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager(page=0, size=${pageSize})}" aria-label="First">
                                <span aria-hidden="true">&laquo;&laquo;</span>
                            </a>
                        </li>

                        <!-- 上一页 -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <!-- 页码 -->
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                            class="page-item"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/manager(page=${i}, size=${pageSize})}" th:text="${i + 1}">1</a>
                        </li>

                        <!-- 下一页 -->
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>

                        <!-- 末页 -->
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager(page=${totalPages - 1}, size=${pageSize})}" aria-label="Last">
                                <span aria-hidden="true">&raquo;&raquo;</span>
                            </a>
                        </li>
                    </ul>

                    <!-- 每页显示数量选择 -->
                    <div class="text-center mt-3">
                        <label class="me-2">每页显示:</label>
                        <select class="form-select d-inline-block w-auto" onchange="window.location.href='/manager?page=0&size=' + this.value">
                            <option value="5" th:selected="${pageSize == 5}">5 条</option>
                            <option value="10" th:selected="${pageSize == 10}">10 条</option>
                            <option value="20" th:selected="${pageSize == 20}">20 条</option>
                            <option value="50" th:selected="${pageSize == 50}">50 条</option>
                        </select>
                    </div>
                </nav>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-white mt-4 mb-3">
            <p class="mb-1">
                <a href="/api/prompts" class="text-white text-decoration-none me-3">
                    <i class="bi bi-code-square"></i> REST API
                </a>
                <a href="/h2-console" class="text-white text-decoration-none me-3" target="_blank">
                    <i class="bi bi-database"></i> H2 Console
                </a>
                <a href="/" class="text-white text-decoration-none">
                    <i class="bi bi-book"></i> API 文档
                </a>
            </p>
            <p class="mb-0">Made with <i class="bi bi-heart-fill text-danger"></i> by Kanyun | Powered by Spring Boot 3.4</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
